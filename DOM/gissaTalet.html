<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let randomNumber = Math.floor(Math.random() * 10) + 1;

let attempts = 0;

while (true) {

    let guess = prompt("Gissa ett tal mellan 1-10");

    attempts++;

    if (guess > randomNumber) {
        alert("För högt");
    }
    else if (guess < randomNumber) {
        alert("För lågt");
    }
    else {
        alert("Rätt! Antal försök: " + attempts);
        break;
    }

}
    </script>
</body>
</html>
