<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Farenheit till Celcius</h1>
    <script>
        function farenheitToCelcius(farenheit) {
            let celcius = (farenheit - 32) * 5/9;
            return celcius;
        }
        let tempFarenheit = 104;
        let tempCelcius = farenheitToCelcius(tempFarenheit);
        document.write(tempFarenheit + " grader Farenheit är lika med " + tempCelcius + " grader Celcius.");

    </script>
</body>
</html>
