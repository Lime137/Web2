<!DOCTYPE html>
<html lang="en">

<body>
    <h1>Rektangel Area</h1>
    <script>
        function rektangelArea(bredd, höjd) {
            return bredd * höjd;
        }
        let bredd = 5;
        let höjd = 10;
        let area = rektangelArea(bredd, höjd);
        document.write("Rektangelns area är: " + area);

    </script>
</body>
