<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
	<script>
    	function myFun() {
        	document.getElementById("demo").innerHTML = "knappen fungerar!";
    	}
	</script>
</head>

</head>
<body>
    <h2> JavaScript inuti head </h2>
	<h3 id="demo" style="color:green;">
    	Tryck på knappen nedan
	</h3>
	<button type="button" onclick="myFun()">
    	Klicka här
	</button>

</body>
</html>
